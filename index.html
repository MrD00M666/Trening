<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Calendar Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #1c1c1e;
            --card-bg: #2c2c2e;
            --text-color: #ffffff;
            --sub-text: #8e8e93;
            --accent-color: #007aff;
            --day-active: #3a3a3c;
            --day-has-note: #30d158;
            --btn-hover: #3a3a3c;
            --input-bg: #1c1c1e;
            --border-color: #3a3a3c;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: 40px;
        }

        .header-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .header-nav {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--card-bg);
            padding: 5px 10px;
            border-radius: 12px;
        }

        .header-nav h2 {
            margin: 0;
            font-size: 1.1rem;
            text-transform: capitalize;
            text-align: center;
            min-width: 130px;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--accent-color);
            font-size: 1.4rem;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .year-btn {
            font-size: 1rem;
            font-weight: 600;
            color: var(--sub-text);
            margin-right: 5px;
        }

        .nav-btn:active { background-color: var(--btn-hover); }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-bottom: 5px;
            text-align: center;
        }
        
        .weekday {
            color: var(--sub-text);
            font-size: 0.8rem;
            font-weight: 500;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-bottom: 20px;
        }

        .day {
            background-color: var(--card-bg);
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            position: relative;
        }

        .day.empty { background: transparent; cursor: default; }
        .day.today { background-color: #48484a; border: 1px solid #666; }
        .day.has-note { border: 2px solid var(--day-has-note); color: var(--day-has-note); }
        .day.has-note.workout-b::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: 7px;
            transform: translateX(-50%);
            width: 14px;
            height: 2px;
            border-radius: 2px;
            background-color: var(--day-has-note);
        }
        .day:active:not(.empty) { transform: scale(0.95); }

        .year-view {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .month-card {
            background-color: var(--card-bg);
            padding: 15px 5px;
            border-radius: 10px;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: capitalize;
        }
        .month-card.current { border: 1px solid var(--accent-color); color: var(--accent-color); }

        #noteModal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            backdrop-filter: blur(4px);
            overflow-y: auto;
            padding: 20px 0;
            align-items: flex-start;
            justify-content: center;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin: auto; 
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }
        
        .modal-header h3 { margin: 0; font-size: 1.2rem; }
        .modal-header span { color: var(--sub-text); font-size: 0.9rem; }

        .exercise-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .exercise-item {
            background: var(--bg-color);
            padding: 10px;
            border-radius: 10px;
        }

        .exercise-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
        }

        .ex-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
            display: block;
            line-height: 1.3;
            padding-top: 20px;
        }

        .weight-group {
            width: 105px;
            flex-shrink: 0;
        }

        .weight-group label,
        .exercise-note-label,
        .notes-section label {
            display: block;
            margin-bottom: 5px;
            color: var(--sub-text);
            font-size: 0.9rem;
        }

        .weight-group label {
            text-align: center;
            font-size: 0.75rem;
        }

        .prev-val {
            font-size: 0.75rem;
            color: var(--day-has-note);
            text-align: center;
            min-height: 14px;
            margin-bottom: 1px;
            font-weight: 600;
        }

        .ex-input {
            background: #2c2c2e;
            border: 1px solid var(--border-color);
            color: white;
            padding: 8px 6px;
            border-radius: 6px;
            text-align: center;
            font-size: 1rem;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }
        .ex-input:focus,
        textarea:focus { border-color: var(--accent-color); }

        textarea {
            width: 100%;
            height: 80px;
            background: var(--bg-color);
            color: #fff;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px;
            resize: none;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 20px;
        }

        .exercise-note {
            margin-bottom: 0;
        }

        #noteInput {
            height: 110px;
        }

        .btn-group { display: flex; gap: 10px; position: sticky; bottom: 0; background: var(--card-bg); padding-top: 10px; }

        button.action-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        #saveBtn { background-color: var(--accent-color); color: white; }
        #closeBtn { background-color: #3a3a3c; color: #ff3b30; }

        .loader { 
            text-align: center; 
            color: var(--sub-text); 
            font-size: 0.8rem; 
            height: 20px; 
            margin-bottom: 5px;
        }

        .rest-day-msg {
            text-align: center;
            color: var(--sub-text);
            padding: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="header-wrapper">
        <div class="header-nav">
            <button class="nav-btn year-btn" onclick="toggleViewMode()" id="yearBtn">2024</button>
            <button class="nav-btn" onclick="changeMonth(-1)">&#10094;</button> 
            <h2 id="monthTitle" onclick="toggleViewMode()">...</h2>
            <button class="nav-btn" onclick="changeMonth(1)">&#10095;</button> 
        </div>
    </div>

    <div id="status" class="loader">Загрузка...</div>

    <div id="calendarContainer">
        <div class="weekdays">
            <div class="weekday">Пн</div>
            <div class="weekday">Вт</div>
            <div class="weekday">Ср</div>
            <div class="weekday">Чт</div>
            <div class="weekday">Пт</div>
            <div class="weekday">Сб</div>
            <div class="weekday">Вс</div>
        </div>
        <div class="calendar-grid" id="calendar"></div>
    </div>

    <div id="yearView" class="year-view"></div>

    <div id="noteModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalDateTitle">Дата</h3>
                <span id="dayNameTitle">День недели</span>
            </div>

            <div id="exercisesContainer" class="exercise-list"></div>

            <div class="notes-section">
                <label>Дополнительные заметки:</label>
                <textarea id="noteInput" placeholder="Самочувствие, комментарии..."></textarea>
            </div>

            <div class="btn-group">
                <button id="closeBtn" class="action-btn">Закрыть</button>
                <button id="saveBtn" class="action-btn">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        // --- КОНФИГУРАЦИЯ ---
        const DOC_ID = '57319602ea8e41138fb868b026aadc79';
        const API_URL = `https://api.jsoneditoronline.org/v2/docs/${DOC_ID}/data`;

        // Дата начала цикла — скорректируй под первый день тренировки A
        const CYCLE_START_DATE = new Date('2025-03-17');

        // Цикл: A → отдых → B → отдых → повтор
        const WORKOUT_CYCLES = [
            [ // A
                "Подтягивания", "Отжимания (ноги выше)", "Шея вперед", "Шея назад",
                "Шея боковые", "Предплечья верх", "Предплечья вниз", "Гиперэкстензия", "Шраги (трапеции)"
            ],
            [], // Отдых
            [ // B
                "Жим ногами", "Тяга рычажная (спина)", "Жим вверх плечи",
                "Махи (ср. дельта)", "Бабочка (зад. дельта)", "Французский жим", "Бицепс"
            ],
            []  // Отдых
        ];

        const CYCLE_LABELS = ["Тренировка A", "Отдых", "Тренировка B", "Отдых"];

        function getCycleIndex(dateObj) {
            const start = new Date(CYCLE_START_DATE);
            start.setHours(0, 0, 0, 0);
            const d = new Date(dateObj);
            d.setHours(0, 0, 0, 0);
            const diffDays = Math.round((d - start) / (1000 * 60 * 60 * 24));
            return ((diffDays % 4) + 4) % 4;
        }

        function getWorkoutForDate(dateObj) {
            return WORKOUT_CYCLES[getCycleIndex(dateObj)];
        }

        function getWorkoutLabel(dateObj) {
            return CYCLE_LABELS[getCycleIndex(dateObj)];
        }

        const tg = window.Telegram.WebApp;
        tg.expand(); 

        let workoutData = {};
        let displayedDate = new Date(); 
        let selectedDateKey = null;        
        let isYearView = false;

        const calendarEl = document.getElementById('calendar');
        const yearViewEl = document.getElementById('yearView');
        const calendarContainer = document.getElementById('calendarContainer');
        const modal = document.getElementById('noteModal');
        const noteInput = document.getElementById('noteInput');
        const exercisesContainer = document.getElementById('exercisesContainer');
        const statusEl = document.getElementById('status');
        const monthTitle = document.getElementById('monthTitle');
        const yearBtn = document.getElementById('yearBtn');
        const modalDateTitle = document.getElementById('modalDateTitle');
        const dayNameTitle = document.getElementById('dayNameTitle');

        // --- 1. Работа с данными ---

        async function loadData() {
            statusEl.innerText = "Обновление...";
            try {
                const response = await fetch(API_URL);
                if (response.ok) {
                    const data = await response.json();
                    workoutData = data || {};
                    statusEl.innerText = "";
                } else {
                    workoutData = {};
                    statusEl.innerText = "";
                }
            } catch (error) {
                console.error(error);
                statusEl.innerText = "Офлайн режим";
            }
        }

        async function saveData() {
            statusEl.innerText = "Сохранение...";
            try {
                const response = await fetch(API_URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(workoutData)
                });
                if (response.ok) {
                    statusEl.innerText = "Сохранено ✅";
                    setTimeout(() => statusEl.innerText = "", 2000);
                } else {
                    statusEl.innerText = "Ошибка сервера ❌";
                }
            } catch (error) {
                statusEl.innerText = "Ошибка сети ❌";
            }
        }

        // --- 2. Логика календаря ---

        function changeMonth(offset) {
            if (isYearView) {
                displayedDate.setFullYear(displayedDate.getFullYear() + offset);
            } else {
                displayedDate.setMonth(displayedDate.getMonth() + offset);
            }
            render();
        }

        function toggleViewMode() {
            isYearView = !isYearView;
            render();
        }

        function selectMonth(monthIndex) {
            displayedDate.setMonth(monthIndex);
            isYearView = false;
            render();
        }

        function render() {
            const year = displayedDate.getFullYear();
            yearBtn.innerText = year;

            if (isYearView) {
                calendarContainer.style.display = 'none';
                yearViewEl.style.display = 'grid';
                monthTitle.innerText = "Выберите месяц";
                renderYearView();
            } else {
                calendarContainer.style.display = 'block';
                yearViewEl.style.display = 'none';
                
                const monthName = displayedDate.toLocaleString('ru-RU', { month: 'long' });
                monthTitle.innerText = monthName.charAt(0).toUpperCase() + monthName.slice(1);
                renderCalendar();
            }
        }

        function renderYearView() {
            yearViewEl.innerHTML = '';
            const currentMonth = new Date().getMonth();
            const currentYear = new Date().getFullYear();
            const displayYear = displayedDate.getFullYear();

            for (let i = 0; i < 12; i++) {
                const monthDiv = document.createElement('div');
                monthDiv.className = 'month-card';
                const name = new Date(displayYear, i).toLocaleString('ru-RU', { month: 'long' });
                monthDiv.innerText = name;

                if (i === currentMonth && displayYear === currentYear) {
                    monthDiv.classList.add('current');
                }

                monthDiv.onclick = () => selectMonth(i);
                yearViewEl.appendChild(monthDiv);
            }
        }

        function renderCalendar() {
            calendarEl.innerHTML = '';
            const year = displayedDate.getFullYear();
            const month = displayedDate.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            let firstDayIndex = new Date(year, month, 1).getDay();
            firstDayIndex = (firstDayIndex === 0) ? 6 : firstDayIndex - 1;

            const today = new Date();

            for (let i = 0; i < firstDayIndex; i++) {
                const emptyEl = document.createElement('div');
                emptyEl.className = 'day empty';
                calendarEl.appendChild(emptyEl);
            }

            for (let i = 1; i <= daysInMonth; i++) {
                const dayEl = document.createElement('div');
                dayEl.className = 'day';
                dayEl.innerText = i;
                
                const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                
                if (workoutData[dateKey]) {
                    dayEl.classList.add('has-note');

                    const dateObj = new Date(year, month, i);
                    if (getCycleIndex(dateObj) === 2) {
                        dayEl.classList.add('workout-b');
                    }
                }

                if (year === today.getFullYear() && month === today.getMonth() && i === today.getDate()) {
                    dayEl.classList.add('today');
                }

                dayEl.onclick = () => openModal(dateKey, i, month, year);
                calendarEl.appendChild(dayEl);
            }
        }

        // --- 3. Модальное окно ---

        function getLastLog(currentDateKey, exName) {
            const allDates = Object.keys(workoutData).sort();
            const pastDates = allDates.filter(d => d < currentDateKey);

            for (let i = pastDates.length - 1; i >= 0; i--) {
                const dKey = pastDates[i];
                const dayData = workoutData[dKey];
                
                if (dayData && typeof dayData === 'object' && dayData.exercises) {
                    const ex = dayData.exercises.find(e => e.name === exName);
                    if (ex) return ex;
                }
            }
            return null;
        }

        function escapeHTML(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function openModal(dateKey, dayNum, month, year) {
            selectedDateKey = dateKey;
            
            const dateObj = new Date(year, month, dayNum);

            modalDateTitle.innerText = `${dayNum}.${String(month + 1).padStart(2, '0')}.${year}`;
            dayNameTitle.innerText = getWorkoutLabel(dateObj);

            let savedData = workoutData[dateKey];
            let savedExercises = [];
            let savedNote = "";

            if (typeof savedData === 'string') {
                savedNote = savedData;
            } else if (savedData && typeof savedData === 'object') {
                savedExercises = savedData.exercises || [];
                savedNote = savedData.note || "";
            }

            noteInput.value = savedNote;
            exercisesContainer.innerHTML = ''; 

            const planExercises = getWorkoutForDate(dateObj);

            if (planExercises && planExercises.length > 0) {
                planExercises.forEach(exName => {
                    const savedEx = savedExercises.find(e => e.name === exName) || {};
                    const prevEx = getLastLog(dateKey, exName) || {};
                    
                    const exItem = document.createElement('div');
                    exItem.className = 'exercise-item';
                    exItem.dataset.name = exName;

                    const exerciseNote = savedEx.note || savedEx.exerciseNote || '';
                    const inputsHTML = `
                        <div class="exercise-top">
                            <span class="ex-name">${escapeHTML(exName)}</span>
                            <div class="weight-group">
                                <div class="prev-val">${escapeHTML(prevEx.weight || '')}</div>
                                <label>Вес (кг)</label>
                                <input type="number" class="ex-input inp-weight" placeholder="0" value="${escapeHTML(savedEx.weight || '')}">
                            </div>
                        </div>
                        <label class="exercise-note-label">Заметки:</label>
                        <textarea class="exercise-note inp-ex-note" placeholder="Техника, ощущения, комментарии...">${escapeHTML(exerciseNote)}</textarea>
                    `;
                    
                    exItem.innerHTML = inputsHTML;
                    exercisesContainer.appendChild(exItem);
                });
            } else {
                exercisesContainer.innerHTML = '<div class="rest-day-msg">День отдыха!</div>';
            }

            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
            noteInput.blur();
        }

        document.getElementById('closeBtn').onclick = closeModal;

        document.getElementById('saveBtn').onclick = async () => {
            const noteText = noteInput.value.trim();
            const exerciseItems = document.querySelectorAll('.exercise-item');
            
            let exercisesToSave = [];

            exerciseItems.forEach(item => {
                const name = item.dataset.name;
                const inpWeight = item.querySelector('.inp-weight');
                const inpExNote = item.querySelector('.inp-ex-note');

                let entry = { name };
                let hasData = false;
                const weight = inpWeight ? inpWeight.value.trim() : '';
                const exerciseNote = inpExNote ? inpExNote.value.trim() : '';

                if (weight) entry.weight = weight;
                if (exerciseNote) entry.note = exerciseNote;
                if (entry.weight || entry.note) hasData = true;

                if (hasData) exercisesToSave.push(entry);
            });

            const entry = {
                exercises: exercisesToSave,
                note: noteText
            };

            if (exercisesToSave.length > 0 || noteText) {
                workoutData[selectedDateKey] = entry;
            } else {
                delete workoutData[selectedDateKey];
            }

            closeModal();
            render();
            await saveData();
        };

        window.onclick = function(event) {
            if (event.target == modal) closeModal();
        }

        async function init() {
            render(); 
            await loadData(); 
            render(); 
        }

        init();
    </script>
</body>
</html>
